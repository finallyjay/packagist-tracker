services:
  version-checker:
    build: .
    volumes:
      - ./versions:/app/versions
    env_file:
      - .env
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CHECK_INTERVAL=${CHECK_INTERVAL:-900}
    entrypoint: ["sh", "-c", "while true; do python main.py; sleep ${CHECK_INTERVAL:-900}; done"]
    restart: unless-stopped
